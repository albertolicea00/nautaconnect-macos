name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build -v
      - name: Test
        run: swift test -v
      - name: Bundle app
        run: ./scripts/build-app.sh
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NautaConnect.app
          path: dist/NautaConnect.app
